name: Mobile Release Build

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "GitHub release tag to upload APK to (defaults to latest release)"
        required: false
        type: string

concurrency:
  group: mobile-release-${{ github.event.release.tag_name || inputs.release_tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  android-release:
    name: Android build, submit, and release asset upload
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
      EAS_TOKEN: ${{ secrets.EAS_TOKEN }}
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      EXPO_PUBLIC_WS_URL: ${{ secrets.EXPO_PUBLIC_WS_URL }}
      EXPO_PUBLIC_POSTHOG_KEY: ${{ secrets.EXPO_PUBLIC_POSTHOG_KEY }}
      EXPO_PUBLIC_POSTHOG_HOST: ${{ secrets.EXPO_PUBLIC_POSTHOG_HOST }}
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        working-directory: .
        run: bun install --frozen-lockfile

      - name: Resolve release tag
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "release" ]; then
            release_tag="${{ github.event.release.tag_name }}"
          elif [ -n "${{ inputs.release_tag }}" ]; then
            release_tag="${{ inputs.release_tag }}"
          else
            release_tag="$(gh release list --limit 1 --json tagName --jq '.[0].tagName')"
          fi

          if [ -z "$release_tag" ] || [ "$release_tag" = "null" ]; then
            echo "Could not determine release tag. Provide workflow_dispatch input 'release_tag'." >&2
            exit 1
          fi

          gh release view "$release_tag" > /dev/null

          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${EAS_TOKEN}" ]; then
            echo "EAS_TOKEN is not set. Add it as a repository secret." >&2
            exit 1
          fi

          if [ -z "${GOOGLE_SERVICE_ACCOUNT_JSON}" ]; then
            echo "GOOGLE_SERVICE_ACCOUNT_JSON is not set. Add Play service account JSON as a repository secret." >&2
            exit 1
          fi

      - name: Configure Play service account file
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .secrets
          printf '%s' "${GOOGLE_SERVICE_ACCOUNT_JSON}" > .secrets/google-service-account.json

      - name: Validate EAS auth
        shell: bash
        run: |
          set -euo pipefail
          bun x eas-cli --version
          bun x eas-cli whoami --non-interactive

      - name: Sync EAS env vars (production)
        shell: bash
        run: |
          set -euo pipefail

          upsert_env() {
            local name="$1"
            local value="$2"
            local visibility="$3"

            if [ -z "$value" ]; then
              echo "Skipping empty var: $name"
              return
            fi

            bun x eas-cli env:create \
              --non-interactive \
              --scope project \
              --environment production \
              --name "$name" \
              --value "$value" \
              --visibility "$visibility" \
              --force
          }

          upsert_env "EXPO_PUBLIC_WS_URL" "${EXPO_PUBLIC_WS_URL}" plaintext
          upsert_env "EXPO_PUBLIC_POSTHOG_KEY" "${EXPO_PUBLIC_POSTHOG_KEY}" sensitive
          upsert_env "EXPO_PUBLIC_POSTHOG_HOST" "${EXPO_PUBLIC_POSTHOG_HOST}" plaintext
          upsert_env "EXPO_PUBLIC_APP_ENV" "production" plaintext

      - name: Build Android AAB (store)
        shell: bash
        env:
          TAG_NAME: ${{ steps.meta.outputs.release_tag }}
        run: |
          set -euo pipefail

          bun x eas-cli build \
            --platform android \
            --profile production \
            --message "GitHub release ${TAG_NAME}" \
            --non-interactive \
            --wait \
            --json > eas-build-production.json

      - name: Parse AAB build metadata
        id: aab
        shell: bash
        run: |
          set -euo pipefail

          build_id="$(jq -r 'if type == "array" then .[0].id else .id end' eas-build-production.json)"
          build_url="$(jq -r 'if type == "array" then (. [0].buildDetailsPageUrl // .[0].buildUrl // "n/a") else (.buildDetailsPageUrl // .buildUrl // "n/a") end' eas-build-production.json)"

          if [ -z "$build_id" ] || [ "$build_id" = "null" ]; then
            echo "Unable to resolve Android AAB build id." >&2
            cat eas-build-production.json
            exit 1
          fi

          echo "build_id=$build_id" >> "$GITHUB_OUTPUT"
          echo "build_url=$build_url" >> "$GITHUB_OUTPUT"

      - name: Submit Android AAB to Google Play
        shell: bash
        run: |
          set -euo pipefail

          bun x eas-cli submit \
            --platform android \
            --profile production \
            --id "${{ steps.aab.outputs.build_id }}" \
            --non-interactive \
            --wait

      - name: Build Android APK (release asset)
        shell: bash
        env:
          TAG_NAME: ${{ steps.meta.outputs.release_tag }}
        run: |
          set -euo pipefail

          bun x eas-cli build \
            --platform android \
            --profile production-apk \
            --message "GitHub release ${TAG_NAME} APK asset" \
            --non-interactive \
            --wait \
            --json > eas-build-apk.json

      - name: Parse APK build metadata
        id: apk
        shell: bash
        run: |
          set -euo pipefail

          build_id="$(jq -r 'if type == "array" then .[0].id else .id end' eas-build-apk.json)"
          build_url="$(jq -r 'if type == "array" then (. [0].buildDetailsPageUrl // .[0].buildUrl // "n/a") else (.buildDetailsPageUrl // .buildUrl // "n/a") end' eas-build-apk.json)"
          artifact_url="$(jq -r 'if type == "array" then (. [0].artifacts.buildUrl // empty) else (.artifacts.buildUrl // empty) end' eas-build-apk.json)"

          if [ -z "$build_id" ] || [ "$build_id" = "null" ]; then
            echo "Unable to resolve Android APK build id." >&2
            cat eas-build-apk.json
            exit 1
          fi

          if [ -z "$artifact_url" ] || [ "$artifact_url" = "null" ]; then
            echo "Unable to resolve Android APK artifact URL." >&2
            cat eas-build-apk.json
            exit 1
          fi

          echo "build_id=$build_id" >> "$GITHUB_OUTPUT"
          echo "build_url=$build_url" >> "$GITHUB_OUTPUT"
          echo "artifact_url=$artifact_url" >> "$GITHUB_OUTPUT"

      - name: Download APK artifact
        id: download
        shell: bash
        env:
          TAG_NAME: ${{ steps.meta.outputs.release_tag }}
        run: |
          set -euo pipefail

          mkdir -p ../../release-assets

          apk_name="secret-reputation-${TAG_NAME}.apk"
          apk_path="../../release-assets/${apk_name}"

          curl -fL "${{ steps.apk.outputs.artifact_url }}" -o "$apk_path"

          if [ ! -s "$apk_path" ]; then
            echo "Downloaded APK is empty or missing at $apk_path" >&2
            exit 1
          fi

          echo "apk_name=$apk_name" >> "$GITHUB_OUTPUT"
          echo "apk_path=release-assets/${apk_name}" >> "$GITHUB_OUTPUT"

      - name: Upload APK to GitHub release
        shell: bash
        working-directory: .
        run: |
          set -euo pipefail

          gh release upload \
            "${{ steps.meta.outputs.release_tag }}" \
            "${{ steps.download.outputs.apk_path }}" \
            --clobber

      - name: Upload build metadata
        uses: actions/upload-artifact@v4
        with:
          name: eas-android-release-${{ github.run_id }}
          path: |
            apps/mobile/eas-build-production.json
            apps/mobile/eas-build-apk.json

      - name: Add summary
        shell: bash
        run: |
          set -euo pipefail

          {
            echo "### Android release pipeline completed"
            echo "- Release tag: \`${{ steps.meta.outputs.release_tag }}\`"
            echo "- Store build profile: \`production\`"
            echo "- APK build profile: \`production-apk\`"
            echo "- AAB build: ${{ steps.aab.outputs.build_url }}"
            echo "- APK build: ${{ steps.apk.outputs.build_url }}"
            echo "- Uploaded APK asset: \`${{ steps.download.outputs.apk_path }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
