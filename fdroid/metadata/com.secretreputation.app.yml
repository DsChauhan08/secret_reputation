MaintainerNotes: |
  This file is a prepared starter for fdroiddata submission.

  Before opening an fdroiddata MR, complete these requirements:

  * Replace release assets with an optimized APK release tag (recommended v1.0.1+).
  * Extract and set AllowedAPKSigningKeys from the release APK:
      apksigner verify --print-certs secret-reputation-vX.Y.Z.apk
  * Add a reproducible Builds: recipe that passes `fdroid build`.
    (Current project uses Expo managed workflow and does not yet include
    a validated fdroidserver build recipe.)

