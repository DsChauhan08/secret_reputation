AutoName: Secret Reputation
Summary: Anonymous multiplayer voting party game with chaos rounds
Description: |
  Secret Reputation is an anonymous multiplayer party game for friend groups.

  Create or join a room, pick your name and color, and vote privately on
  "most likely to..." categories. Nobody sees who voted for whom.

  Features include:

  * Room-based anonymous voting
  * Light Roast / Normal Chaos / Unhinged modes
  * Reveal commentary and vote breakdown
  * Tie-break transparency and optional chaos-card rounds
  * Opt-in shared custom question vault

  The app is open source and uses a Cloudflare Workers backend.

RepoType: git
Repo: https://github.com/DsChauhan08/secret_reputation.git

Builds:
  - versionName: 1.0.1
    versionCode: 2
    commit: v1.0.1
    subdir: apps/mobile
    output: android/app/build/outputs/apk/release/*.apk
    build:
      - cd ../..
      - npm install --workspaces --include-workspace-root
      - cd apps/mobile
      - export NODE_ENV=production
      - CI=1 npx expo prebuild --platform android --no-install
      - cd android
      - printf '%s\n' 'org.gradle.daemon=false' 'org.gradle.workers.max=1' 'kotlin.compiler.execution.strategy=in-process'
        'org.gradle.jvmargs=-Xmx3072m -XX:MaxMetaspaceSize=768m -Dfile.encoding=UTF-8'
        >> gradle.properties
      - ./gradlew --no-daemon --max-workers=1 --stacktrace assembleRelease

MaintainerNotes: |
  First-pass source build recipe is included for Expo-managed React Native.

  For official fdroiddata inclusion, validate with:
    fdroid readmeta
    fdroid lint com.secretreputation.app
    fdroid build com.secretreputation.app

  Upstream EAS binary verification is currently disabled in metadata because
  the built APK does not yet reproduce byte-for-byte in local fdroid builds.

